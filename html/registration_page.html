<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Page</title>
    <link rel="stylesheet" href="../css/main.css">
</head>

<body id="registration-body">
    <div id="registration-content">
        <form class="form-registration">
            <h1>Crie a sua conta</h1>

            <div class="input-registration">
                <label for="name">Nome</label>
                <input type="text" id="name" placeholder="Digite seu nome completo" required>
            </div>
            <div class="input-registration">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Digite seu email" required>
            </div>
            <div class="input-registration">
                <label for="password">Senha</label>
                <input type="password" id="password" placeholder="Digite sua senha" required>
            </div>

            <div class="input-registration">
                <label for="cep">CEP</label>
                <input type="text" id="cep" placeholder="00000-000" maxlength="8" required oninput="consultCEP()">
            </div>
            <div class="aba">
                <div class="input-registration">
                    <label for="localidade">Cidade</label>
                    <input type="text" id="localidade" required>
                </div>
                <div class="input-registration">
                    <label for="uf">UF</label>
                    <input type="text" id="uf" required>
                </div>
            </div>
            <div class="aba">
                <div class="input-registration">
                    <label for="logradouro">Endereço</label>
                    <input type="text" id="logradouro" required>
                </div>
                <div class="input-registration">
                    <label for="num">Número</label>
                    <input type="text" id="num" required>
                </div>
            </div>
            <div class="input-registration">
                <label for="bairro">Bairro</label>
                <input type="text" id="bairro" required>
            </div>
            <div class="input-registration">
                <label for="complemento">Complemento</label>
                <input type="text" id="complemento" required>
            </div>
            <button type="submit" class="btn-registration">Cadastrar</button>

            <div class="login">
                <p>Já possui conta? <button type="button" onClick="redirect('./login_page.html')">Fazer login</button></p>
            </div>
        </form>
    </div>

    <script src="../js/main.js"></script>
</body>

</html>
